<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Viscosiana - Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">

    <!-- Header -->
    <header class="bg-green-700 text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">La Viscosiana</h1>
                <p class="text-green-100 text-xs italic">Prodotti freschi da Villanova del Battista</p>
            </div>
            <div class="bg-white/20 p-2 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 118 0m-4 8l2-2m0 0l7-7" />
                    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pb-24">
        
        <!-- Lista Terreni -->
        <section class="mb-8 overflow-x-auto whitespace-nowrap py-2 no-scrollbar">
            <h2 class="text-[10px] uppercase font-bold text-stone-400 mb-3 tracking-widest">Filtra per Campo</h2>
            <div class="flex space-x-2">
                <span class="bg-green-700 text-white px-4 py-1.5 rounded-full text-sm font-medium shadow-sm cursor-pointer">Tutti</span>
                <span class="bg-white text-stone-600 px-4 py-1.5 rounded-full text-sm font-medium border border-stone-200 cursor-pointer">Orto Umido</span>
                <span class="bg-white text-stone-600 px-4 py-1.5 rounded-full text-sm font-medium border border-stone-200 cursor-pointer">WIFIcomplex</span>
                <span class="bg-white text-stone-600 px-4 py-1.5 rounded-full text-sm font-medium border border-stone-200 cursor-pointer">Gradoni</span>
            </div>
        </section>

        <!-- Catalogo -->
        <h2 class="text-xl font-bold mb-4 flex items-center">
            <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded mr-2">3.50€/kg</span>
            Prodotti di Stagione
        </h2>
        
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- JS render -->
        </div>

    </main>

    <!-- Barra di Navigazione Inferiore -->
    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-stone-200 p-4 flex justify-around items-center shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center text-green-700">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 118 0m-4 8l2-2m0 0l7-7" /><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] mt-1 font-bold">Shop</span>
        </button>
        <button class="flex flex-col items-center text-stone-400">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <span class="text-[10px] mt-1">Miei Ordini</span>
        </button>
    </nav>

    <script>
        const prezzoFisso = 3.50;
        const prodotti = [
            { id: 1, nome: "Zucche", campo: "Orto Umido", img: "https://images.unsplash.com/photo-1506806732259-39c2d4ad68b9?auto=format&fit=crop&w=300&q=80" },
            { id: 2, nome: "Patate", campo: "Fresco al mattino", img: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?auto=format&fit=crop&w=300&q=80" },
            { id: 3, nome: "Peperoni Corno", campo: "Peperonaia", img: "https://images.unsplash.com/photo-1566232392379-afd9298e6a46?auto=format&fit=crop&w=300&q=80" },
            { id: 4, nome: "Lattuga Estiva", campo: "Orto Umido", img: "https://images.unsplash.com/photo-1556801712-76c82666703d?auto=format&fit=crop&w=300&q=80" }
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = prodotti.map(p => `
                <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden flex items-center p-2">
                    <img src="${p.img}" alt="${p.nome}" class="w-24 h-24 rounded-xl object-cover">
                    <div class="ml-4 flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-md text-stone-800">${p.nome}</h3>
                                <p class="text-[10px] text-stone-400 uppercase tracking-tighter">${p.campo}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <p class="text-green-700 font-bold text-lg">€ ${prezzoFisso.toFixed(2)}</p>
                            <button class="bg-stone-900 text-white px-4 py-1.5 rounded-lg text-xs font-bold active:bg-green-600 transition-colors">
                                +
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderProducts;
    </script>
</body>
</html>
